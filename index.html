  const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
  const auth = getAuth(app); auth.languageCode = "es";
  let verifier = null, confirmation = null;
  function clearVerifier(){
    try{ if(verifier){ verifier.clear(); } }catch(e){}
    verifier = null;
    var old = document.getElementById("deco-recaptcha");
    if(old && old.parentNode){ old.parentNode.removeChild(old); }
  }
  function makeVerifier(){
    clearVerifier();
    var c = document.createElement("div");
    c.id = "deco-recaptcha";
    c.style.cssText = "position:fixed;bottom:0;right:0;width:1px;height:1px;overflow:hidden";
    document.body.appendChild(c);
    verifier = new RecaptchaVerifier(auth, "deco-recaptcha", { size: "invisible" });
    return verifier;
  }
  window.addEventListener("message", async function(ev){
    const d = ev.data || {};
    if(!d.__deco_auth) return;
    const reply = function(payload){
      try{ ev.source && ev.source.postMessage(Object.assign({__deco_auth_reply: d.id}, payload), "*"); }catch(e){}
    };
    try{
      if(d.action === "sendSMS"){
        confirmation = await signInWithPhoneNumber(auth, d.phone, makeVerifier());
        clearVerifier();
        reply({ ok:true });
      } else if(d.action === "confirm"){
        if(!confirmation){ reply({ ok:false, msg:"Pedí el código primero." }); return; }
        await confirmation.confirm(d.code);
        reply({ ok:true });
      } else if(d.action === "getToken"){
        const u = auth.currentUser;
        const t = u ? await u.getIdToken() : null;
        reply({ ok:true, token:t });
      }
    }catch(e){
      clearVerifier();
      reply({ ok:false, msg: (e && e.message) || "Error" });
    }
  });
</script></body></html>
